  phase2_timeout: 45      # 单只深度分析超时秒数
  min_amount: 10000000    # 最低成交额过滤（元）
  min_scale: 200000000    # 最低规模过滤（元）
  quick_score_weights:
    momentum: 30
    volume: 20
    capital_flow: 20
    shares_trend: 15
    iopv: 15
  p1_exclusive_bonus:
    shares_trend: 0.05
    iopv: 0.05
